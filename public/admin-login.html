<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DistriQuiz - Admin Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>DistriQuiz</h1>
      <p>Admin Login</p>
    </header>
    <main>
      <div class="login-card">
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
          </div>
          <p id="login-error" class="error-msg"></p>
          <button type="submit" class="btn">Login</button>
        </form>
      </div>
      <div class="footer-link" style="margin-top:1.5rem;">
        <a href="/">Back to Home</a>
      </div>
    </main>
  </div>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("login-error");
      errorEl.textContent = "";
      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = "/admin.html";
        } else {
          errorEl.textContent = data.error || "Login failed";
        }
      } catch {
        errorEl.textContent = "Connection error";
      }
    });
  </script>
</body>
</html>
