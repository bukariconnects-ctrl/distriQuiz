<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DistriQuiz - Host</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>DistriQuiz - Presenter</h1>
      <p id="room-code-header" style="display:none;">Room Code: <span id="room-code-display">------</span></p>
    </header>
    <main>
      <section id="setup-panel">
        <h2>Create Game</h2>
        <div class="setup-card">
          <div class="form-group">
            <label for="quiz-select">Choose Quiz</label>
            <select id="quiz-select">
              <option value="">-- Random Questions --</option>
            </select>
          </div>
          <div class="form-group">
            <label for="duration-input">Seconds per Question</label>
            <input type="number" id="duration-input" min="5" max="60" value="15">
          </div>
          <button id="create-lobby-btn" class="btn">Create Lobby</button>
          <p id="setup-error" class="error-msg"></p>
        </div>
      </section>
      <section id="lobby" style="display:none;">
        <h2>Lobby</h2>
        <p class="subtitle">Share this code with players to join.</p>
        <div id="quiz-info">
          <h3 id="lobby-quiz-title">Quiz</h3>
          <p id="lobby-question-count">0 questions loaded</p>
        </div>
        <ol id="player-list">
          <li class="empty">Waiting for players...</li>
        </ol>
        <div id="p2p-metrics" class="p2p-metrics">Waiting for peer transfers...</div>
        <button id="start-game-btn" class="btn start-btn" disabled>Start Game</button>
      </section>
      <section id="question-area" style="display:none;">
        <h2 id="question-text">Waiting for the first question...</h2>
        <div id="dfs-asset-area" style="display:none;">
          <img id="dfs-asset-img" alt="Quiz asset" />
        </div>
        <div id="host-options" class="options-grid"></div>
      </section>
      <section id="leaderboard" style="display:none;">
        <h2>Leaderboard</h2>
        <ol id="score-list">
          <li>No scores yet</li>
        </ol>
      </section>
      <section id="game-over" style="display:none;">
        <h2>Game Over!</h2>
        <ol id="final-ranking"></ol>
        <a href="/" class="btn">Back to Home</a>
      </section>
    </main>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/client.js"></script>
</body>
</html>
